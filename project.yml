# XcodeGen 项目配置文件
# 使用方式: brew install xcodegen && xcodegen generate

name: ClipSmart
options:
  bundleIdPrefix: com.clipsmart
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""  # 填入你的 Apple Team ID
    PRODUCT_BUNDLE_IDENTIFIER: com.clipsmart.app
    INFOPLIST_FILE: ClipSmart/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: ClipSmart/Resources/ClipSmart.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    PRODUCT_NAME: ClipSmart
    # 关闭 App Sandbox（全局热键需要）
    ENABLE_APP_SANDBOX: NO

schemes:
  ClipSmart:
    build:
      targets:
        ClipSmart: all
        ClipSmartTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: ClipSmartTests
          randomExecutionOrder: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

targets:
  ClipSmart:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - ClipSmart
    dependencies:
      - package: KeyboardShortcuts
    info:
      path: ClipSmart/Resources/Info.plist
    entitlements:
      path: ClipSmart/Resources/ClipSmart.entitlements
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.clipsmart.app
      INFOPLIST_FILE: ClipSmart/Resources/Info.plist

  ClipSmartTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - ClipSmartTests
      - path: ClipSmart/Core
      - path: ClipSmart/AppShell/Settings/PreferencesStore.swift
    dependencies:
      - package: KeyboardShortcuts
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.clipsmart.app.tests
      SWIFT_OBJC_INTERFACE_HEADER_NAME: ""
